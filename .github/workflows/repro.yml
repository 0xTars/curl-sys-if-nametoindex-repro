name: repro

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  minimal:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Build minimal baseline
        shell: pwsh
        continue-on-error: true
        run: |
          cargo build -vv *>&1 | Tee-Object minimal.log
          exit $LASTEXITCODE

      - name: Inspect minimal result
        shell: pwsh
        run: |
          $log = Get-Content minimal.log -Raw
          if ($log -match '__imp_if_nametoindex') {
            Write-Host 'minimal repro hit __imp_if_nametoindex'
          } else {
            Write-Host 'minimal repro did not hit __imp_if_nametoindex'
          }

      - name: Upload minimal log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minimal-log
          path: minimal.log

  cargo-baseline:
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/checkout@v5
        with:
          repository: rust-lang/cargo
          ref: 8e799e11cd904bf8682f106b805e619b544cf412
          path: cargo-src

      - name: Build Cargo all-static
        shell: pwsh
        continue-on-error: true
        run: |
          Push-Location cargo-src
          cargo build -vv --release --features all-static -p cargo *>&1 | Tee-Object ..\cargo-baseline.log
          $code = $LASTEXITCODE
          Pop-Location
          exit $code

      - name: Check Cargo baseline failure shape
        shell: pwsh
        run: |
          $log = Get-Content cargo-baseline.log -Raw
          if ($log -notmatch '__imp_if_nametoindex') {
            throw 'cargo baseline did not fail with __imp_if_nametoindex'
          }

      - name: Upload Cargo baseline log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-baseline-log
          path: cargo-baseline.log

  cargo-patched:
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/checkout@v5
        with:
          repository: rust-lang/cargo
          ref: 8e799e11cd904bf8682f106b805e619b544cf412
          path: cargo-src

      - name: Fetch Cargo dependencies
        shell: pwsh
        run: |
          Push-Location cargo-src
          cargo fetch
          Pop-Location

      - name: Patch curl-sys build.rs
        shell: pwsh
        run: |
          $buildRs = Get-ChildItem "$env:USERPROFILE\.cargo\registry\src" -Recurse -Filter build.rs |
            Where-Object { $_.FullName -match 'curl-sys-0\.4\.86\+curl-8\.19\.0' } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $buildRs) {
            throw 'could not locate curl-sys 0.4.86 build.rs'
          }

          $content = Get-Content $buildRs -Raw
          $needle = '        println!("cargo:rustc-link-lib=crypt32");'
          $replacement = @(
            '        println!("cargo:rustc-link-lib=crypt32");'
            '        println!("cargo:rustc-link-lib=iphlpapi");'
          ) -join "`n"

          if ($content -notmatch 'cargo:rustc-link-lib=crypt32') {
            throw 'expected crypt32 link line was not found'
          }

          $updated = $content.Replace($needle, $replacement.TrimEnd("`r", "`n"))
          Set-Content -Path $buildRs -Value $updated
          Write-Host "patched $buildRs"

      - name: Build Cargo with iphlpapi
        shell: pwsh
        run: |
          Push-Location cargo-src
          cargo build -vv --release --features all-static -p cargo *>&1 | Tee-Object ..\cargo-patched.log
          $code = $LASTEXITCODE
          Pop-Location
          exit $code

      - name: Upload Cargo patched log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-patched-log
          path: cargo-patched.log
