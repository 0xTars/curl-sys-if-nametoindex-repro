name: repro

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  CARGO_HOME: C:\Users\runneradmin\.cargo

jobs:
  xpy-baseline:
    runs-on: windows-2025
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - uses: actions/checkout@v5
        with:
          repository: rust-lang/rust
          ref: f0ff0628bc708f087e33d57efe406b8cff323a1f
          fetch-depth: 2
          submodules: recursive
          path: rust-src

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure Rust baseline
        shell: pwsh
        run: |
          Push-Location rust-src
          python src/bootstrap/configure.py `
            --build=x86_64-pc-windows-msvc `
            --enable-lld `
            --enable-verbose-tests `
            --disable-manage-submodules `
            --enable-locked-deps `
            --enable-cargo-native-static `
            --set rust.codegen-units-std=1 `
            --set llvm.download-ci-llvm=if-unchanged `
            --set build.print-step-timings `
            --set build.metrics `
            --set rust.lld=true `
            --set build.optimized-compiler-builtins *>&1 | Tee-Object ..\xpy-baseline-configure.log
          $code = $LASTEXITCODE
          Pop-Location
          exit $code

      - name: Run x.py baseline
        shell: pwsh
        continue-on-error: true
        run: |
          Push-Location rust-src
          python x.py --stage 2 test src/tools/cargotest src/tools/cargo *>&1 | Tee-Object ..\xpy-baseline.log
          $code = $LASTEXITCODE
          Pop-Location
          exit $code

      - name: Inspect x.py baseline result
        shell: pwsh
        run: |
          $log = Get-Content xpy-baseline.log -Raw
          if ($log -match '__imp_if_nametoindex') {
            Write-Host 'x.py baseline hit __imp_if_nametoindex'
          } else {
            Write-Host 'x.py baseline did not hit __imp_if_nametoindex'
          }

      - name: Upload x.py baseline log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xpy-baseline-log
          path: |
            xpy-baseline-configure.log
            xpy-baseline.log

  xpy-patched:
    runs-on: windows-2025
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - uses: actions/checkout@v5
        with:
          repository: rust-lang/rust
          ref: f0ff0628bc708f087e33d57efe406b8cff323a1f
          fetch-depth: 2
          submodules: recursive
          path: rust-src

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure Rust patched variant
        shell: pwsh
        run: |
          Push-Location rust-src
          python src/bootstrap/configure.py `
            --build=x86_64-pc-windows-msvc `
            --enable-lld `
            --enable-verbose-tests `
            --disable-manage-submodules `
            --enable-locked-deps `
            --enable-cargo-native-static `
            --set rust.codegen-units-std=1 `
            --set llvm.download-ci-llvm=if-unchanged `
            --set build.print-step-timings `
            --set build.metrics `
            --set rust.lld=true `
            --set build.optimized-compiler-builtins *>&1 | Tee-Object ..\xpy-patched-configure.log
          $code = $LASTEXITCODE
          Pop-Location
          exit $code

      - name: Fetch Cargo dependencies
        shell: pwsh
        run: |
          Push-Location rust-src\src\tools\cargo
          cargo fetch --locked
          Pop-Location

      - name: Patch curl-sys build.rs
        shell: pwsh
        run: |
          $buildRs = Get-ChildItem "$env:USERPROFILE\.cargo\registry\src" -Recurse -Filter build.rs |
            Where-Object { $_.FullName -match 'curl-sys-0\.4\.86\+curl-8\.19\.0' } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $buildRs) {
            throw 'could not locate curl-sys 0.4.86 build.rs'
          }

          $content = Get-Content $buildRs -Raw
          $needle = '        println!("cargo:rustc-link-lib=crypt32");'
          $replacement = @(
            '        println!("cargo:rustc-link-lib=crypt32");'
            '        println!("cargo:rustc-link-lib=iphlpapi");'
          ) -join "`n"

          if ($content -notmatch 'cargo:rustc-link-lib=crypt32') {
            throw 'expected crypt32 link line was not found'
          }

          $updated = $content.Replace($needle, $replacement.TrimEnd("`r", "`n"))
          Set-Content -Path $buildRs -Value $updated
          Write-Host "patched $buildRs"

      - name: Run x.py patched variant
        shell: pwsh
        continue-on-error: true
        run: |
          Push-Location rust-src
          python x.py --stage 2 test src/tools/cargotest src/tools/cargo *>&1 | Tee-Object ..\xpy-patched.log
          $code = $LASTEXITCODE
          Pop-Location
          exit $code

      - name: Inspect x.py patched result
        shell: pwsh
        run: |
          $log = Get-Content xpy-patched.log -Raw
          if ($log -match '__imp_if_nametoindex') {
            Write-Host 'x.py patched variant still hit __imp_if_nametoindex'
          } else {
            Write-Host 'x.py patched variant did not hit __imp_if_nametoindex'
          }

      - name: Upload x.py patched log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xpy-patched-log
          path: |
            xpy-patched-configure.log
            xpy-patched.log
